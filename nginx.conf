##############################################################################
# home-stream Nginx config
# - Nginx serves /stream/* directly from disk (zero-copy, kernel sendfile)
# - Everything else proxies to Gunicorn on 127.0.0.1:5000
#
# Usage:
#   sudo cp nginx.conf /etc/nginx/sites-available/home-stream
#   sudo ln -s /etc/nginx/sites-available/home-stream /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
##############################################################################

upstream gunicorn {
    server 127.0.0.1:5000;
    keepalive 8;
}

server {
    listen 8080;          # change to 80 if you want port 80
    server_name _;

    # ── Direct video file serving (bypasses Python entirely) ──────────────
    # Map /stream/<media_id> → the actual file on disk via an internal redirect.
    # The Flask /stream route sets X-Accel-Redirect; Nginx does the rest.

    location /stream/ {
        # Forward to Flask first so it can auth/resolve the path,
        # then Flask replies with X-Accel-Redirect: /media-internal/<file>
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   Range $http_range;
        proxy_set_header   If-Range $http_if_range;
        proxy_pass_header  Content-Range;
    }

    # Internal alias used by X-Accel-Redirect.
    # Nginx serves the bytes directly — kernel sendfile, no Python.
    location /media-internal/ {
        internal;
        # IMPORTANT: set this to the absolute path of your media + converted dirs.
        # Nginx will append the path after /media-internal/ to this root.
        alias /home/pranav/Downloads/coding/projects/home-stream/;

        sendfile           on;
        sendfile_max_chunk 2m;
        aio                threads;        # async I/O via thread pool (great for HDD)
        directio           4m;            # bypass page cache for files > 4 MB
        tcp_nopush         on;
        tcp_nodelay        on;

        # Allow browsers to cache range-response metadata
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "no-store" always;

        # Needed for byte-range (seek) support
        output_buffers 2 512k;
        postpone_output 0;
    }

    # ── Everything else → Gunicorn ────────────────────────────────────────
    location / {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Static files served directly (CSS, JS, images)
    location /static/ {
        alias /home/pranav/Downloads/coding/projects/home-stream/static/;
        expires 1d;
        add_header Cache-Control "public";
    }
}
