<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="HOME-STREAM — self-hosted media streaming for your local network" />
  <title>{% block title %}HOME-STREAM{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">HOME<span>STREAM</span></a>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search your library…" autocomplete="off" />
    </div>
    <button class="refresh-btn" id="refresh-btn" title="Rescan media folder">↻ Refresh</button>
  </nav>

  {% if flash %}
  <div class="flash">{{ flash }}</div>
  {% endif %}

  {% block content %}{% endblock %}

  <script>
    document.getElementById("refresh-btn").addEventListener("click", function () {
      this.textContent = "↻ Scanning…";
      this.disabled = true;
      fetch("/api/refresh", { method: "POST" })
        .then(() => location.reload())
        .catch(() => location.reload());
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
